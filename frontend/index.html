<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Disease Detection</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f7f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 600px;
            text-align: center;
        }
        h1 {
            color: #2d6a2d;
            margin-bottom: 8px;
            font-size: 28px;
        }
        p.subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .upload-area {
            border: 2px dashed #2d6a2d;
            border-radius: 12px;
            padding: 40px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .upload-area:hover { background: #f0fff0; }
        .upload-area p { color: #666; margin-top: 10px; }
        input[type="file"] { display: none; }
        #preview {
            max-width: 100%;
            max-height: 250px;
            border-radius: 12px;
            margin: 16px auto;
            display: none;
        }
        button {
            background: #2d6a2d;
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: background 0.3s;
        }
        button:hover { background: #1a4a1a; }
        button:disabled { background: #999; cursor: not-allowed; }
        .result {
            margin-top: 24px;
            padding: 20px;
            border-radius: 12px;
            display: none;
            text-align: left;
        }
        .result.healthy { background: #e8f5e9; border: 2px solid #4caf50; }
        .result.diseased { background: #ffeaea; border: 2px solid #f44336; }
        .result h3 { font-size: 20px; margin-bottom: 12px; }
        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        .result-row:last-child { border-bottom: none; }
        .label { color: #666; font-weight: bold; }
        .value { color: #333; }
        .loading { color: #666; margin-top: 16px; display: none; }
        .emoji { font-size: 48px; }
    </style>
</head>
<body>
<div class="container">
    <div class="emoji">🌿</div>
    <h1>Crop Disease Detection</h1>
    <p class="subtitle">Upload a crop leaf image to detect diseases instantly</p>

    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <div class="emoji">📷</div>
        <p>Click here to upload a leaf image</p>
        <p style="font-size:12px; margin-top:8px">Supports: JPG, PNG</p>
    </div>

    <input type="file" id="fileInput" accept="image/*" onchange="previewImage(event)">
    <img id="preview" alt="Preview">

    <button id="predictBtn" onclick="predict()" disabled>
        🔍 Detect Disease
    </button>

    <div class="loading" id="loading">
        ⏳ Analyzing image... please wait
    </div>

    <div class="result" id="result">
        <h3 id="resultTitle"></h3>
        <div class="result-row">
            <span class="label">🌱 Plant:</span>
            <span class="value" id="plantName"></span>
        </div>
        <div class="result-row">
            <span class="label">🦠 Disease:</span>
            <span class="value" id="diseaseName"></span>
        </div>
        <div class="result-row">
            <span class="label">💊 Status:</span>
            <span class="value" id="healthStatus"></span>
        </div>
        <div class="result-row">
            <span class="label">📊 Confidence:</span>
            <span class="value" id="confidence"></span>
        </div>
    </div>
</div>

<script>
    let selectedFile = null;

    function previewImage(event) {
        selectedFile = event.target.files[0];
        if (!selectedFile) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const preview = document.getElementById('preview');
            preview.src = e.target.result;
            preview.style.display = 'block';
        };
        reader.readAsDataURL(selectedFile);
        document.getElementById('predictBtn').disabled = false;
    }

    async function predict() {
        if (!selectedFile) return;

        document.getElementById('loading').style.display = 'block';
        document.getElementById('result').style.display = 'none';
        document.getElementById('predictBtn').disabled = true;

        const formData = new FormData();
        formData.append('file', selectedFile);

        try {
            const response = await fetch('http://localhost:8000/predict', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            document.getElementById('plantName').textContent    = data.plant;
            document.getElementById('diseaseName').textContent  = data.disease;
            document.getElementById('healthStatus').textContent = data.health_status;
            document.getElementById('confidence').textContent   = data.confidence;

            const resultDiv = document.getElementById('result');
            const resultTitle = document.getElementById('resultTitle');

            if (data.health_status === 'Healthy') {
                resultDiv.className = 'result healthy';
                resultTitle.textContent = '✅ Plant is Healthy!';
            } else {
                resultDiv.className = 'result diseased';
                resultTitle.textContent = '⚠️ Disease Detected!';
            }

            resultDiv.style.display = 'block';

        } catch (error) {
            alert('Error connecting to API. Make sure the server is running!');
        }

        document.getElementById('loading').style.display = 'none';
        document.getElementById('predictBtn').disabled = false;
    }
</script>
</body>
</html>
